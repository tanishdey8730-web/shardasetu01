<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
(function(){var b="",h=location.hostname;if(/\.github\.io$/i.test(h)){var s=location.pathname.split("/").filter(Boolean)[0];if(s&&!/\.html$/i.test(s))b="/"+s+"/";}window.SHARDA_BASE=b;if(b){var e=document.createElement("base");e.href=b;document.head.appendChild(e);}})();
  </script>
  <title>Forgot Password — Sharda Setu</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="ui-enhancements.css">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <meta name="theme-color" content="#1a237e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sharda Setu" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg" />
  <link rel="stylesheet" href="pwa.css" />
</head>
<body>
  <div class="auth-layout">
    <div class="auth-banner">
      <img src="assets/logo.svg" alt="Sharda Setu" width="56" height="56"/>
      <h2>Reset Password</h2>
      <p>We'll send you a secure link to create a new password.</p>
    </div>
    <div class="container">
      <form class="login-box" id="forgot-form">
        <h1>Forgot Password</h1>
        <p class="subtitle">Enter the email address for your account</p>
        <p id="forgot-error" class="form-error" role="alert"></p>
        <p id="forgot-success" class="form-success" role="status" hidden></p>

        <label class="label" for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="icon">📧</span>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn">Send reset link</button>
        <p class="signup"><a href="login.html">Back to sign in</a></p>
      </form>
    </div>
  </div>
  <script src="auth.js"></script>
  <script>
    document.getElementById("forgot-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("forgot-error");
      const ok = document.getElementById("forgot-success");
      err.textContent = "";
      ok.hidden = true;
      try {
        const data = await ShardaAuth.forgotPassword(document.getElementById("email").value);
        ok.hidden = false;
        ok.textContent = data.message || "Check your email for a reset link.";
        e.target.querySelector("button").disabled = true;
      } catch (ex) {
        err.textContent = ex.message;
      }
    });
  </script>
  <script src="pwa.js" defer></script>
</body>
</html>
