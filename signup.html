<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
(function(){var b="",h=location.hostname;if(/\.github\.io$/i.test(h)){var s=location.pathname.split("/").filter(Boolean)[0];if(s&&!/\.html$/i.test(s))b="/"+s+"/";}window.SHARDA_BASE=b;if(b){var e=document.createElement("base");e.href=b;document.head.appendChild(e);}})();
  </script>
  <title>Create Account - Sharda Setu</title>
  <link rel="stylesheet" href="signup.css">
  <link rel="stylesheet" href="ui-enhancements.css">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <meta name="theme-color" content="#1a237e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sharda Setu" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg" />
  <link rel="stylesheet" href="pwa.css" />
</head>
<body>
  <div class="auth-layout">
    <div class="auth-banner">
      <img src="assets/logo.svg" alt="Sharda Setu" width="56" height="56"/>
      <h2>Join Sharda Setu</h2>
      <p>Create your free profile and start preparing for SSC, CDS, AFCAT, NDA and more.</p>
      <img class="auth-banner-photo" src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=600&q=80" alt="Campus education"/>
    </div>
    <div class="container">
      <form class="signup-box" id="signup-form">
        <h1>Create Account</h1>
        <p class="subtitle">Fill in the details to get started</p>
        <p id="signup-error" class="form-error" role="alert"></p>

        <label class="label">I want to:</label>
        <div class="radio-group">
          <label><input type="radio" name="role" value="student" checked> Learn (Student)</label>
          <label><input type="radio" name="role" value="teacher"> Teach (Teacher)</label>
        </div>

        <label class="label" for="name">Full Name</label>
        <div class="input-wrapper">
          <span class="icon">👤</span>
          <input type="text" id="name" placeholder="Enter your full name" required>
        </div>

        <label class="label" for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="icon">📧</span>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <label class="label" for="password">Password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="Min 8 chars, letter + number" required minlength="8">
        </div>

        <label class="label" for="confirm-password">Confirm Password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" required>
            I agree to the Terms of Service and Privacy Policy
          </label>
        </div>

        <button type="submit" class="btn">Create Account</button>

        <div class="auth-divider"><span>or</span></div>
        <button type="button" class="btn btn-google" id="google-signup">Sign up with Google</button>

        <p class="signin">Already have an account? <a href="login.html">Sign in here</a></p>
      </form>
    </div>
  </div>
  <script src="auth.js"></script>
  <script>
    document.getElementById("google-signup").addEventListener("click", () => ShardaAuth.loginWithGoogle());

    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("signup-error");
      err.textContent = "";
      const pw = document.getElementById("password").value;
      const cpw = document.getElementById("confirm-password").value;
      if (pw !== cpw) { err.textContent = "Passwords do not match."; return; }
      const role = document.querySelector('input[name="role"]:checked')?.value || "student";
      try {
        const data = await ShardaAuth.register({
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: pw,
          role
        });
        if (data.user && !data.user.emailVerified) {
          window.location.href = "verify-email.html";
        } else {
          window.location.href = "profile.html";
        }
      } catch (ex) {
        err.textContent = ex.message || "Registration failed. Start the server with npm start.";
      }
    });
  </script>
  <script src="pwa.js" defer></script>
</body>
</html>
