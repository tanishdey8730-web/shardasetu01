<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
(function(){var b="",h=location.hostname;if(/\.github\.io$/i.test(h)){var s=location.pathname.split("/").filter(Boolean)[0];if(s&&!/\.html$/i.test(s))b="/"+s+"/";}window.SHARDA_BASE=b;if(b){var e=document.createElement("base");e.href=b;document.head.appendChild(e);}})();
  </script>
  <title>Reset Password — Sharda Setu</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="ui-enhancements.css">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <meta name="theme-color" content="#1a237e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sharda Setu" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg" />
  <link rel="stylesheet" href="pwa.css" />
</head>
<body>
  <div class="auth-layout">
    <div class="container" style="max-width:420px;margin:48px auto">
      <form class="login-box" id="reset-form">
        <h1>New Password</h1>
        <p class="subtitle">Choose a strong password (8+ chars, letter and number)</p>
        <p id="reset-error" class="form-error" role="alert"></p>

        <label class="label" for="password">New password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" id="password" minlength="8" required>
        </div>

        <label class="label" for="confirm">Confirm password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" id="confirm" minlength="8" required>
        </div>

        <button type="submit" class="btn">Update password</button>
        <p class="signup"><a href="login.html">Sign in</a></p>
      </form>
    </div>
  </div>
  <script src="auth.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get("token");
    if (!token) {
      document.getElementById("reset-error").textContent = "Invalid reset link.";
      document.getElementById("reset-form").querySelector("button").disabled = true;
    }

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("reset-error");
      err.textContent = "";
      const pw = document.getElementById("password").value;
      const cpw = document.getElementById("confirm").value;
      if (pw !== cpw) { err.textContent = "Passwords do not match."; return; }
      try {
        await ShardaAuth.resetPassword(token, pw);
        window.location.href = "login.html?reset=1";
      } catch (ex) {
        err.textContent = ex.message;
      }
    });
  </script>
  <script src="pwa.js" defer></script>
</body>
</html>
